# --- 以下为 MihomoPro 配置专用覆写 ---
[General]
CORE_TYPE = Meta
AUTO_SMART_SWITCH = 0
ENABLE_REDIRECT_DNS = 1
; 不启用 OpenClash 插件的“自定义 DNS 覆写”。
; 也就是 OpenClash 不会用插件界面里的自定义 DNS 设置去强行改写配置文件里的 dns: 段。
ENABLE_CUSTOM_DNS = 0
ENABLE_RESPECT_RULES = 0
ROUTER_SELF_PROXY = 0
APPEND_DEFAULT_DNS = 1
STORE_FAKEIP = 1
DISABLE_UDP_QUIC = 1

#restart: true 代表更新后重启插件，false 代表不重启插件
#force: true 代表强制下载，false 代表不强制下载（当文件不存在时会自动下载）
#cron: 定时下载时间，格式为标准的 cron 表达式，0 代表不启用定时下载
#示例：每天凌晨6点下载一次
#cron=0 6 * * *
#示例：每周一凌晨6点下载一次
#cron=0 6 * * 1
DOWNLOAD_FILE = url=https://gh-proxy.19930405.xyz/https://raw.githubusercontent.com/wangqiankun/OpenClash_Overwrite/refs/heads/main/Yaml/666OS-DNS-Conf.yaml, path=/etc/openclash/config/666OS-dns.yaml, cron=0 6 * * *, force=true

#将模板作为默认配置文件
CONFIG_FILE = /etc/openclash/config/666OS-dns.yaml

#指定展示订阅信息的 URL 地址
; SUB_INFO_URL = $EN_KEY1
SUB_INFO_URL = $EN_KEY

[Overwrite]
#EN_KEY 为对应模块需要用户指定的环境变量值, EN_KEY1=URL1;EN_KEY2=URL2;EN_KEY3=URL3
#其他 Ruby 编辑函数请参考 openclash_custom_overwrite.sh
; ruby_map_edit "$CONFIG_FILE" "['proxy-providers']" "优质服务商" "['url']" "$EN_KEY1"
; ruby_map_edit "$CONFIG_FILE" "['proxy-providers']" "备用服务商" "['url']" "$EN_KEY2"
ruby_map_edit "$CONFIG_FILE" "['proxy-providers']" "Sub-store" "['url']" "$EN_KEY"
