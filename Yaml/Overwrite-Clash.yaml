dns:
  # 用于解析代理服务器域名，避免 respect-rules 启用后 DNS 解析依赖代理产生循环。
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29

proxy-providers:
  Sub-store:
    type: http
    url: "url"
    path: ./proxy_provider/provider.yaml
    proxy: DIRECT
    interval: 86400
    health-check:
      enable: true
      interval: 300
      url: https://g.cn/generate_204
    override:
      skip-cert-verify: true
      udp: true


# 策略组
# =========================================
#             策略组配置
# =========================================
proxy-groups: #!replace
  - { name: 手动选择,        type: select, proxies: [ HK, US, JP, SG, TW, 自建节点, HighTraffic, 自动选择, 全球直连 ], use: [ Sub-store ], filter: '^((?!(落地)).)*$' }
  - { name: 自动选择,        type: url-test, include-all: true, tolerance: 20, interval: 120, filter: "^((?!(直连|落地|自建)).)*$" }
  - { name: Telegram,        type: select, proxies: [ HK, US, SG, JP, TW, HighTraffic, 自建节点, 手动选择, 自动选择, 全球直连 ] }
  #  - {name: ChatGPT,        type: select, proxies: [US, HK, SG, JP, TW, HighTraffic, 自建节点,手动选择, 自动选择, 全球直连]}
  #  - {name: Gemini,         type: select, proxies: [HK, US, SG, JP, TW, HighTraffic, 自建节点,手动选择, 自动选择, 全球直连]}
  - { name: AI服务,         type: select, proxies: [ 自建节点, SG, HK, US, JP, TW, 手动选择, 自动选择 ] }
  - { name: Claude,         type: select, proxies: [ AI服务, SG, HK, US, JP, TW, 自建节点, HighTraffic, 手动选择, 自动选择, 全球直连 ] }
  - { name: JetBrains,      type: select, proxies: [ SG, HK, US, JP, TW, 自建节点, HighTraffic, 手动选择, 自动选择, 全球直连 ] }
  - { name: YouTube,        type: select, proxies: [ HK, US, SG, JP, TW, HighTraffic, 自建节点,手动选择, 自动选择, 全球直连 ] }
  - { name: PayPal,         type: select, proxies: [ US, HK, SG, JP, TW, HighTraffic, 自建节点,手动选择, 自动选择, 全球直连 ] }
  - { name: 谷歌服务,        type: select, proxies: [ HK, US, SG, JP, TW, HighTraffic, 自建节点,手动选择, 自动选择, 全球直连 ] }
  - { name: 苹果服务,        type: select, proxies: [ HK, US, SG, JP, TW, HighTraffic, 自建节点,手动选择, 自动选择, 全球直连 ] }
  - { name: HighTraffic,    type: url-test, include-all: true, tolerance: 20, interval: 120, filter: '^(?=.*(?i)(实验性|Test))(?!.*(?i)(落地|微林)).*$' }
  - { name: 自建节点,         type: select, include-all: true, filter: '^(?=.*(?i)(自建|落地|微林)).*$' }
  - { name: AI出口前置,       type: select, proxies: [ SG, HK, US, JP, TW, HighTraffic, 自动选择 ] }
  - { name: 测速工具,        type: select, proxies: [ HK, US, SG, JP, TW, HighTraffic, 自建节点,手动选择, 自动选择, 全球直连 ] }
  - { name: 漏网之鱼,        type: select, proxies: [ SG, TW, HK, US, JP, HighTraffic, 自建节点,手动选择, 自动选择, 全球直连 ], use: [ Sub-store ], filter: '^((?!(落地|微林)).)*$' }
  #此配置备注： HK 这个组会自动收集所有香港节点，并每隔一段时间测速，自动选择延迟合适的香港节点。
  - { name: HK,        type: url-test, include-all: true, tolerance: 20, interval: 120, url: "https://cp.cloudflare.com/generate_204", filter: '^(?=.*(?i)(港|🇭🇰|HK|Hong|HKG))(?!.*(?i)(落地|微林)).*$' }
  - { name: US,        type: url-test, include-all: true, tolerance: 20, interval: 120, url: "https://cp.cloudflare.com/generate_204", filter: '^(?=.*(?i)(美|🇺🇸|US|USA|SJC|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD))(?!.*(?i)(落地|微林)).*$' }
  - { name: JP,        type: url-test, include-all: true, tolerance: 20, interval: 120, url: "https://cp.cloudflare.com/generate_204", filter: '^(?=.*(?i)(日|🇯🇵|JP|Japan|NRT|HND|KIX|CTS|FUK))(?!.*(?i)(落地|微林)).*$' }
  - { name: SG,      type: url-test, include-all: true, tolerance: 20, interval: 120, url: "https://cp.cloudflare.com/generate_204", filter: '^(?=.*(?i)(坡|🇸🇬|SG|Sing|SIN|XSP))(?!.*(?i)(落地|微林)).*$' }
  - { name: TW,        type: url-test, include-all: true, tolerance: 20, interval: 120, url: "https://cp.cloudflare.com/generate_204", filter: '^(?=.*(?i)(台|🇼🇸|🇹🇼|TW|tai|TPE|TSA|KHH))(?!.*(?i)(落地|微林)).*$' }
  - { name: 全球直连,        type: select,    proxies: [ DIRECT ] }
  - { name: Myself_Direct_Domain, type: select, proxies: [ DIRECT ] }

