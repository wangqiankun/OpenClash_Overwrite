proxy-providers:
  Sub-store:
    type: http
    url: "url"
    path: ./proxy_provider/provider.yaml
    proxy: DIRECT
    interval: 86400
    health-check:
      enable: true
      interval: 300
      url: https://g.cn/generate_204
    override:
      skip-cert-verify: true
      udp: true
      

# 策略组
