proxy-providers:
  Sub-store:
    type: http
    url: "url"
    path: ./proxy_provider/provider.yaml
    proxy: DIRECT
    interval: 86400
    health-check:
      enable: true
      interval: 300
      url: https://g.cn/generate_204
    override:
      skip-cert-verify: true
      udp: true
      
anchor:
  # 策略组类型模板 - 定义不同的策略组基础配置
  BaseURL-test: &BaseURL-test {type: url-test, include-all: true, tolerance: 20, interval: 120, url: "https://cp.cloudflare.com/generate_204"}
  # 节点筛选正则表达式 - 基于地理位置和关键词过滤
  FilterHK: &FilterHK '^(?=.*(?i)(港|🇭🇰|HK|Hong|HKG))(?!.*(?i)(落地|Exit)).*$'
  FilterSG: &FilterSG '^(?=.*(?i)(坡|🇸🇬|SG|Sing|SIN|XSP))(?!.*(?i)(落地|Exit)).*$'
  FilterJP: &FilterJP '^(?=.*(?i)(日|🇯🇵|JP|Japan|NRT|HND|KIX|CTS|FUK))(?!.*(?i)(落地|Exit)).*$'
  FilterUS: &FilterUS '^(?=.*(?i)(美|🇺🇸|US|USA|SJC|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD))(?!.*(?i)(落地|Exit)).*$'
  FilterTW: &FilterTW '^(?=.*(?i)(台|🇼🇸|🇹🇼|TW|tai|TPE|TSA|KHH))(?!.*(?i)(落地|Exit)).*$'
  FilterLargeTraffic: &FilterLargeTraffic '^(?=.*(?i)(实验性))(?!.*(?i)(落地|Exit)).*$'
  FilterExit: &FilterExit '^(?=.*(?i)(落地|Exit)).*$'
  FilterExcludeExit: &FilterExcludeExit '^((?!(落地|Exit)).)*$'

  # 策略组代理列表模板 - 预定义的代理节点优先级排序
  SelectAuto: &SelectAuto {type: url-test, include-all: true, tolerance: 20, interval: 120, filter: "^((?!(直连|落地|Exit)).)*$"}
  SelectLargeTraffic: &SelectLargeTraffic {type: url-test, include-all: true, tolerance: 20, interval: 120, filter: *FilterLargeTraffic}
  SelectAI: &SelectAI {type: select, proxies: [Exit, SG, HK, US, JP, TW, HighTraffic, 手动选择, 自动选择, 全球直连]}
  SelectExit: &SelectExit {type: url-test, include-all: true, tolerance: 20, interval: 120, filter: *FilterExit}
  SelectExitFront: &SelectExitFront {type: select, proxies: [SG, HK, US, JP, TW, HighTraffic, 自动选择]}
  SelectManual: &SelectManual {type: select, proxies: [HK, US, JP, SG, TW, HighTraffic, 自动选择, 全球直连], use: [Sub-store], filter: *FilterExcludeExit}
  SelectOther: &SelectOther {type: select, proxies: [SG, TW, HK, US, JP, HighTraffic, 手动选择, 自动选择, 全球直连], use: [Sub-store], filter: *FilterExcludeExit}
  SelectHK: &SelectHK {type: select, proxies: [HK, US, SG, JP, TW, HighTraffic, 手动选择, 自动选择, 全球直连]}
  SelectUS: &SelectUS {type: select, proxies: [US, HK, SG, JP, TW, HighTraffic, 手动选择, 自动选择, 全球直连]}
  SelectSG: &SelectSG {type: select, proxies: [SG, HK, US, JP, TW, HighTraffic, 手动选择, 自动选择, 全球直连]}
  SelectJP: &SelectJP {type: select, proxies: [JP, HK, US, SG, TW, HighTraffic, 手动选择, 自动选择, 全球直连]}
  SelectTW: &SelectTW {type: select, proxies: [TW, HK, US, SG, JP, HighTraffic, 手动选择, 自动选择, 全球直连]}

  # 规则提供者相关锚点
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}
  class: &class {type: http, interval: 86400, behavior: classical, format: text}

# 策略组
# =========================================
#             策略组配置
# =========================================
proxy-groups:
  - {name: 手动选择,        <<: *SelectManual}
  - {name: 自动选择,        <<: *SelectAuto}
  - {name: Telegram,        <<: *SelectHK}
#  - {name: 社交媒体,        <<: *SelectHK}
#  - {name: GitHub,         <<: *SelectHK}
#  - {name: ChatGPT,        <<: *SelectUS}
#  - {name: Gemini,         <<: *SelectHK}
  - {name: AI服务,         <<: *SelectAI}
#  - {name: TikTok,         <<: *SelectUS}
#  - {name: AppleTV+,       <<: *SelectHK}
  - {name: YouTube,        <<: *SelectHK}
#  - {name: Netflix,        <<: *SelectSG}
#  - {name: DisneyPlus,     <<: *SelectSG}
#  - {name: HBO,            <<: *SelectSG}
#  - {name: PrimeVideo,     <<: *SelectSG}
#  - {name: Emby,           <<: *SelectSG}
#  - {name: Spotify,        <<: *SelectHK}
#  - {name: Bahamut,        <<: *SelectTW}
#  - {name: 国外媒体,        <<: *SelectSG}
  - {name: PayPal,         <<: *SelectUS}
  - {name: 谷歌服务,        <<: *SelectHK}
  - {name: 苹果服务,        <<: *SelectHK}
#  - {name: 微软服务,        <<: *SelectHK}
#  - {name: 游戏平台,        <<: *SelectHK}
#  - {name: Steam,          <<: *SelectHK}
  - {name: HighTraffic,    <<: *SelectLargeTraffic}
  - {name: Exit前置,       <<: *SelectExitFront}
  - {name: Exit,           <<: *SelectExit}
  - {name: 测速工具,        <<: *SelectHK}
  - {name: 漏网之鱼,        <<: *SelectOther}
#此配置备注： HK 这个组会自动收集所有香港节点，并每隔一段时间测速，自动选择延迟合适的香港节点。
  - {name: HK,        <<: *BaseURL-test,    filter: *FilterHK}
  - {name: US,        <<: *BaseURL-test,    filter: *FilterUS}
  - {name: JP,        <<: *BaseURL-test,    filter: *FilterJP}
  - {name: SG,      <<: *BaseURL-test,    filter: *FilterSG}
  - {name: TW,        <<: *BaseURL-test,    filter: *FilterTW}
  - {name: 全球直连,        type: select,    proxies: [DIRECT]}
  - {name: Myself_Direct_Domain, type: select, proxies: [DIRECT]}

