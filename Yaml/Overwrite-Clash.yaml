  - RULE-SET,category-game-platforms-download,全球直连
  - RULE-SET,category-public-tracker,全球直连
  - RULE-SET,category-communication,Telegram
  # - RULE-SET,openai,ChatGPT
  # - RULE-SET,google-gemini,Gemini
  - RULE-SET,JetBrains,JetBrains
  # - RULE-SET,github,GitHub
  - RULE-SET,category-speedtest,测速工具
