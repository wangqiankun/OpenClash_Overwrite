name: 基于666OS覆写
desc: 包含策略组、规则集与自定义分流，主要用在主路由

proxy-providers:
  Sub-store:
    type: http
    url: "url"
    path: ./proxy_provider/provider.yaml
    proxy: DIRECT
    interval: 86400
    health-check:
      enable: true
      interval: 300
      url: https://cp.cloudflare.com/generate_204
    override:
      skip-cert-verify: true
      udp: true


# ==================== 代理提供者 ====================
## 注意：请提供您的机场订阅链接，每个链接一行，并为每个机场命名，末尾的[优][备]为每个节点添加机场名称前缀，可自定义
#proxy-providers:
#  # 优质订阅源 - 优质节点集合，使用时请修改
#  优质服务商: {<<: *BaseProvider, url: '优质订阅源地址', override: {additional-prefix: '[优] '}}
#  # 备用订阅源 - 次优节点集合，使用时请修改
#  备用服务商: {<<: *BaseProvider, url: '备用订阅源地址', override: {additional-prefix: '[备] '}}

# ==================== 核心配置 ====================
# 基础配置
mode: rule
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895
ipv6: false
allow-lan: true
unified-delay: true
tcp-concurrent: true
log-level: warning
bind-address: '*'
find-process-mode: 'always'
keep-alive-interval: 15
keep-alive-idle: 600

# 地理数据库配置
geox-url:
  mmdb: https://testingcf.jsdelivr.net/gh/alecthw/mmdb_china_ip_list@release/Country.mmdb
  geoip: https://testingcf.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geoip.dat
  geosite: https://testingcf.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat
  asn: https://testingcf.jsdelivr.net/gh/xishang0128/geoip@release/GeoLite2-ASN.mmdb
geo-auto-update: true
geo-update-interval: 24
geodata-mode: true

# 认证配置
authentication:
  - mihomo:yyds666
skip-auth-prefixes:
  - 127.0.0.1/8
  - ::1/128

# 实验性功能
experimental:
  quic-go-disable-gso: true

# 管理面板配置
#external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip
#external-ui-name: zashboard
#external-ui: ui
#external-controller: 127.0.0.1:9090
#secret: yyds666

# 配置存储
profile:
  store-selected: true
  store-fake-ip: true

# 流量嗅探
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [ 80, 8080-8880 ]
      override-destination: true
    TLS:
      ports: [ 443, 8443 ]
    QUIC:
      ports: [ 443, 8443 ]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# TUN模式配置（保守增强版）
tun:
  enable: true
  stack: mixed
  mtu: 1492
  dns-hijack:
    - any:53
    - tcp://any:53
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false

# DNS配置（保守增强版，暂不加入 nameserver-policy）
dns:
  enable: true
  listen: 0.0.0.0:7874
  cache-algorithm: arc
  ipv6: true
  prefer-h3: false
  use-hosts: true
  use-system-hosts: true
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-range6: fdfe:dcba:9876::1/64
  fake-ip-filter-mode: blacklist
  default-nameserver:
    - 119.29.29.29
    - 180.184.1.1
    - 223.5.5.5
    - 2400:3200::1
  # 用于解析代理服务器域名，避免 respect-rules 启用后 DNS 解析依赖代理产生循环。
  proxy-server-nameserver:
    - "119.29.29.29#直接连接"
    - "223.5.5.5#直接连接"
  nameserver:
    - "223.5.5.5#直接连接"
    - "119.29.29.29#直接连接"
    - "114.114.114.114#直接连接"
  direct-nameserver:
    - "119.29.29.29#直接连接"
    - "180.184.1.1#直接连接"
    - "223.5.5.5#直接连接"
  direct-nameserver-follow-policy: true
  fallback:
    - "1.1.1.1#直接连接"
    - "8.8.8.8#直接连接"
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
  fake-ip-filter:
    - rule-set:Direct
    - rule-set:Private
    - rule-set:China
    - "*.lan"
    - "*.local"
    - +.localdomain
    - localhost.ptlogin2.qq.com
    - time.windows.com
    - time.apple.com
    - time.android.com
    - +.miwifi.com
    - +.docker.io
    - +.market.xiaomi.com
    - +.push.apple.com



# 节点筛选正则表达式 - 基于地理位置和关键词过滤
FilterHK: &FilterHK '^(?=.*(?i)(港|🇭🇰|HK|Hong|HKG))(?!.*(排除1|排除2|落地|微林|5x)).*$'
FilterSG: &FilterSG '^(?=.*(?i)(坡|🇸🇬|SG|Sing|SIN|XSP))(?!.*(排除1|排除2|落地|微林|5x)).*$'
FilterJP: &FilterJP '^(?=.*(?i)(日|🇯🇵|JP|Japan|NRT|HND|KIX|CTS|FUK))(?!.*(排除1|排除2|落地|微林|5x)).*$'
FilterKR: &FilterKR '^(?=.*(?i)(韩|🇰🇷|韓|首尔|南朝鲜|KR|KOR|Korea|South))(?!.*(排除1|排除2|落地|微林|5x)).*$'
FilterUS: &FilterUS '^(?=.*(?i)(美|🇺🇸|US|USA|SJC|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD))(?!.*(排除1|排除2|落地|微林|5x)).*$'
FilterTW: &FilterTW '^(?=.*(?i)(台|🇼🇸|🇹🇼|TW|tai|TPE|TSA|KHH))(?!.*(排除1|排除2|落地|微林|5x)).*$'
FilterEU: &FilterEU '^(?=.*(?i)(奥|比|保|克罗地亚|塞|捷|丹|爱沙|芬|法|德|希|匈|爱尔|意|拉|立|卢|马其它|荷|波|葡|罗|斯洛伐|斯洛文|西|瑞|英|🇧🇪|🇨🇿|🇩🇰|🇫🇮|🇫🇷|🇩🇪|🇮🇪|🇮🇹|🇱🇹|🇱🇺|🇳🇱|🇵🇱|🇸🇪|🇬🇧|CDG|FRA|AMS|MAD|BCN|FCO|MUC|BRU))(?!.*(排除1|排除2|落地|微林|5x)).*$'
# FilterOT = Filter Other，其他地区节点过滤器。
# 翻译：Filter Other = 过滤其他；排除常见国家/地区关键词后，保留冷门或未归类节点。
FilterOT: &FilterOT '^(?!.*(DIRECT|直接连接|美|港|坡|台|新|日|韩|奥|比|保|克罗地亚|塞|捷|丹|爱沙|芬|法|德|希|匈|爱尔|意|拉|立|卢|马其它|荷|波|葡|罗|斯洛伐|斯洛文|西|瑞|英|🇭🇰|🇼🇸|🇹🇼|🇸🇬|🇯🇵|🇰🇷|🇺🇸|🇬🇧|🇦🇹|🇧🇪|🇨🇿|🇩🇰|🇫🇮|🇫🇷|🇩🇪|🇮🇪|🇮🇹|🇱🇹|🇱🇺|🇳🇱|🇵🇱|🇸🇪|HK|TW|SG|JP|KR|US|GB|CDG|FRA|AMS|MAD|BCN|FCO|MUC|BRU|HKG|TPE|TSA|KHH|SIN|XSP|NRT|HND|KIX|CTS|FUK|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD|LHR|LGW))'
# FilterAL = Filter All，全部可用节点过滤器。
# 翻译：Filter All = 过滤全部；排除订阅信息、官网、流量、到期等非节点条目。
FilterAL: &FilterAL '^(?!.*(DIRECT|直接连接|群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author))'


# 策略组
# =========================================
#             策略组配置
# =========================================

# 策略组类型模板 - 定义不同的策略组基础配置
BaseFB: &BaseFB { type: fallback, interval: 300, lazy: true, url: 'https://cp.cloudflare.com/generate_204' }
# BaseUT = Base URL-Test，基础自动测速模板。
# 翻译：Base URL-Test = 基础 URL 测速；用于自动选择延迟最低的节点。
BaseUT: &BaseUT { type: url-test, interval: 300, tolerance: 80, lazy: true, url: 'https://cp.cloudflare.com/generate_204', hidden: true }

#  一致性哈希。（用不到）
#  同一个目标地址/连接特征通常会被分配到同一个节点。
#BaseCH: &BaseCH { type: load-balance, interval: 200, lazy: true, url: 'https://www.google.com/generate_204', strategy: consistent-hashing, hidden: true }
#  轮询。（用不到）
#  新连接按顺序轮流分配到不同节点。
#BaseCR: &BaseCR { type: load-balance, interval: 200, lazy: true, url: 'https://www.google.com/generate_204', strategy: round-robin, hidden: true }


# 策略组代理列表模板 - 预定义的代理节点优先级排序
# SelectFB = Select Fallback，保留故障转移作为兜底的手动选择模板。
# 翻译：Select Fallback = 选择故障转移；默认优先使用高频地区策略，故障转移只作为兜底。
SelectFB: &SelectFB { type: select, proxies: [ 香港策略, 狮城策略, 日本策略, 美国策略, 自建SG, 故障转移, 冷门自选, 全球手动, 直接连接 ] }
# SelectPY = Select Proxy，代理优先的手动选择模板。
# 翻译：Select Proxy = 选择代理；默认把“默认代理”放在第一位。
SelectPY: &SelectPY { type: select, proxies: [ 默认代理, 故障转移, 流量节点, 香港策略, 狮城策略, 日本策略, 美国策略, 冷门自选, 全球手动, 直接连接 ] }
# SelectDC = Select Direct Connection，直连优先的手动选择模板。
# 翻译：Select Direct Connection = 选择直接连接；默认把“直接连接”放在第一位。
SelectDC: &SelectDC { type: select, proxies: [ 直接连接, 默认代理, 故障转移, 香港策略, 狮城策略, 日本策略, 美国策略, 冷门自选, 全球手动 ] }
SelectHK: &SelectHK { type: select, proxies: [ 香港策略, 默认代理, 故障转移, 狮城策略, 日本策略, 美国策略, 冷门自选, 全球手动, 直接连接 ] }
SelectSG: &SelectSG { type: select, proxies: [ 狮城策略, 默认代理, 故障转移, 香港策略, 日本策略, 美国策略, 冷门自选, 全球手动, 直接连接 ] }
SelectUS: &SelectUS { type: select, proxies: [ 美国策略, 默认代理, 故障转移, 香港策略, 狮城策略, 日本策略, 冷门自选, 全球手动, 直接连接 ] }
SelectAI: &SelectAI { type: select, proxies: [ Claude, ChatGPT, 自建SG, 狮城策略, 默认代理, 故障转移, 香港策略, 日本策略, 美国策略, 冷门自选, 全球手动, 直接连接 ] }





# ==================== 代理策略组 ====================
proxy-groups: #!replace
  # ==================== 主要策略组 ====================
  - { name: 默认代理,     <<: *SelectFB, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Static.png }
  - { name: 故障转移,     <<: *BaseFB, proxies: [ 香港策略, 狮城策略, 日本策略, 美国策略, 直接连接 ], icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/ULB.png }
  - { name: 国外流量,     <<: *SelectPY, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Global.png }
  - { name: 国内流量,     <<: *SelectDC, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/China.png }
  - { name: 兜底流量,     <<: *SelectPY, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Final.png }
  - { name: 直接连接,     type: select, proxies: [ DIRECT ], hidden: true, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Direct.png }

  # ==================== 功能策略组 ====================
  - { name: 网络测试,     <<: *SelectPY, include-all: true, filter: *FilterAL, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Speedtest.png }
  #  - { name: 抖快书定位,   type: select, proxies: [ 直接连接, 香港策略, 狮城策略, 日本策略, 美国策略 ], icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Null_Nation.png }

  # ==================== 媒体服务 ====================
  #  - { name: Emby服,      <<: *SelectPY, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Emby.png }
  - { name: 油管视频,     <<: *SelectPY, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/YouTube.png }
  #  - { name: 奈飞视频,     <<: *SelectPY, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Netflix.png }
  #  - { name: 国际媒体,     <<: *SelectPY, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/DomesticMedia.png }
  #  - { name: 新闻媒体,     <<: *SelectUS, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Apple_News.png }

  # ==================== 社交平台 ====================
  - { name: 电报消息,     <<: *SelectPY, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Telegram_X.png }
  - { name: 推特社交,     <<: *SelectPY, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/X.png }
  - { name: 社交平台,     <<: *SelectPY, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/PBS.png }

  # ==================== 商业服务 ====================
  - { name: 人工智能,     <<: *SelectAI, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/AI.png }
  - { name: ChatGPT,    type: select, proxies: [ 自建SG, 狮城策略, 美国策略, 日本策略, 默认代理, 故障转移, 全球手动, 直接连接 ], icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/ChatGPT.png }
  - { name: Claude,     type: select, proxies: [ 自建SG, 狮城策略, 美国策略, 日本策略, 默认代理, 故障转移, 全球手动, 直接连接 ], icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/AI.png }
  - { name: JetBrains,  type: select, proxies: [ 自建SG, 狮城策略, 香港策略, 美国策略, 日本策略, 自建节点, 全球手动, 直接连接 ], icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/JetBrains.png }
  - { name: 货币平台,     <<: *SelectSG, icon: https://raw.githubusercontent.com/Orz-3/mini/master/Alpha/Bitcloud.png }
  - { name: 游戏平台,     <<: *SelectPY, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Game.png }
  - { name: 微软服务,     <<: *SelectPY, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Microsoft.png }
  - { name: 谷歌服务,     <<: *SelectPY, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Google_Search.png }
  - { name: 苹果服务,     <<: *SelectPY, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Apple.png }

  # ==================== 地区策略组 ====================
  - { name: 香港策略,     type: select, proxies: [ 香港自动 ], include-all: true, filter: *FilterHK, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Hong_Kong.png }
  - { name: 狮城策略,     type: select, proxies: [ 狮城自动 ], include-all: true, filter: *FilterSG, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Singapore.png }
  - { name: 日本策略,     type: select, proxies: [ 日本自动 ], include-all: true, filter: *FilterJP, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Japan.png }
  - { name: 美国策略,     type: select, proxies: [ 美国自动 ], include-all: true, filter: *FilterUS, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/United_States.png }

  # ==================== 自建策略组 ====================
  - { name: 自建SG,   type: fallback, include-all: true, url: "https://cp.cloudflare.com/generate_204", interval: 300, filter: '^(?=.*自建新加坡)(?!.*(测试|备用|Traffic|Test)).*$' }
  - { name: 自建节点, type: select, include-all: true, filter: '^(?=.*(?i)(自建|落地|微林)).*$' }
  - { name: 流量节点, type: url-test, include-all: true, tolerance: 80, interval: 300, url: "https://cp.cloudflare.com/generate_204", filter: '^(?=.*(?i)(实验性|实验|测试|Test|Traffic|流量))(?!.*(?i)(落地|微林)).*$'}

  # ==================== 其他策略组 ====================
  - { name: 冷门自选,     type: select, include-all: true, filter: *FilterOT, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Europe_Map.png }
  - { name: 全球手动,     type: select, include-all: true, filter: *FilterAL, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Clubhouse.png }

  # ==================== 自动测速组 ====================
  - { name: 香港自动,     <<: *BaseUT, include-all: true, filter: *FilterHK, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Auto.png }
  - { name: 狮城自动,     <<: *BaseUT, include-all: true, filter: *FilterSG, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Auto.png }
  - { name: 日本自动,     <<: *BaseUT, include-all: true, filter: *FilterJP, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Auto.png }
  - { name: 美国自动,     <<: *BaseUT, include-all: true, filter: *FilterUS, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Auto.png }

  #   #此配置备注： HK 这个组会自动收集所有香港节点，并每隔一段时间测速，自动选择延迟合适的香港节点。
  #   - { name: HK,        type: url-test, include-all: true, tolerance: 20, interval: 120, url: "https://cp.cloudflare.com/generate_204", filter: *FilterHK }


# ==================== 规则路由 ====================
# 备注：优先走 rules 里从上到下第一个命中的策略。
rules:
  # 拦截规则
  - RULE-SET,Tracking,REJECT
  - RULE-SET,Advertising,REJECT
  - AND,((DST-PORT,443),(NETWORK,UDP),(NOT,((GEOIP,CN)))),REJECT  # 阻止海外 QUIC

  # 域名规则
  #  - RULE-SET,LocationDKS,抖快书定位
  - RULE-SET,Private,直接连接
  - RULE-SET,Direct,直接连接
  - RULE-SET,Myself_Direct_Domain,直接连接
  - RULE-SET,XPTV,直接连接
  - RULE-SET,Download,直接连接
  - RULE-SET,AppleCN,直接连接
  - RULE-SET,Myself_AI_Domain,Claude
  - RULE-SET,Claude,Claude
  - RULE-SET,openai,ChatGPT
  - RULE-SET,category-ai,Claude
  - RULE-SET,AI,人工智能
  - DOMAIN-KEYWORD,speedtest,网络测试
  - RULE-SET,Speedtest,网络测试
  - RULE-SET,Twitter,推特社交
  - RULE-SET,Telegram,电报消息
  - RULE-SET,SocialMedia,社交平台
  #  - RULE-SET,NewsMedia,新闻媒体
  - RULE-SET,Games,游戏平台
  - RULE-SET,Myself_Crypto_Domain,货币平台
  - RULE-SET,Crypto,货币平台
  #  - RULE-SET,Emby,Emby服
  #  - RULE-SET,Netflix,奈飞视频
  - RULE-SET,YouTube,油管视频
  #  - RULE-SET,Streaming,国际媒体
  - RULE-SET,Apple,苹果服务
